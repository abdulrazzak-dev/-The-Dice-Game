<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dice Game</title>
<link rel="stylesheet" href="style.css" />
<link rel="index.js"  href="index.js.js"/>
</head>
<body>

  <div class="container">
    <h1>🎲 Dice Game 🎲</h1>
    <p class="subtitle">Player with the higher number wins!</p>

    
    <div class="game-board">
      <div class="player-box">
        <h2>Player 1</h2>
        <img id="img1" src="https://raw.githubusercontent.com/tewarig/Dice_IMG/main/1.png" alt="Player 1 dice" class="dice-img" />
      </div>

      <div class="vs">VS</div>

      <div class="player-box">
        <h2>Player 2</h2>
        <img id="img2" src="https://raw.githubusercontent.com/tewarig/Dice_IMG/main/1.png" alt="Player 2 dice" class="dice-img" />
      </div>
    </div>

    <h2 id="result" class="result"></h2>

    <button id="rollBtn">Roll the Dice</button>
  </div>

  <script src="index.js"></script>
</body>
</html>
